name: DB Backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    name: PostgreSQL Backup to R2
    runs-on: ubuntu-latest
    steps:
      - name: Dump and upload
        uses: appleboy/ssh-action@v1
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_ENDPOINT,R2_BUCKET
          script: |
            set -euo pipefail
            DUMP="/tmp/paperbot-$(date +%Y%m%d).dump"

            pg_dump -U paperbot -Fc paperbot > "$DUMP"

            AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            aws s3 cp "$DUMP" "s3://${R2_BUCKET}/paperbot-$(date +%Y%m%d).dump" \
              --endpoint-url "$R2_ENDPOINT"

            rm -f "$DUMP"

      - name: Prune old backups
        uses: appleboy/ssh-action@v1
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_ENDPOINT,R2_BUCKET
          script: |
            set -euo pipefail
            CUTOFF=$(date -d '30 days ago' +%Y%m%d)

            AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
            aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url "$R2_ENDPOINT" \
              | awk '{print $4}' \
              | grep '^paperbot-' \
              | while read -r key; do
                  file_date=$(echo "$key" | grep -oP '\d{8}')
                  if [ "$file_date" -lt "$CUTOFF" ]; then
                    AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
                    AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
                    aws s3 rm "s3://${R2_BUCKET}/$key" \
                      --endpoint-url "$R2_ENDPOINT"
                  fi
                done
